# docker-compose.yml — SDN Poison Guard Tool
#
# Usage:
# docker compose up # run full pipeline, results saved to ./results/
# docker compose run tool bash # interactive shell

services:
  tool:
    build: .
    image: sdn-poison-guard
    container_name: sdn-poison-guard
    volumes:
      # Results are written here so you can access them on your host machine
      - ./results:/app/results
    environment:
      - PYTHONUNBUFFERED=1    # ensures print() output appears immediately
